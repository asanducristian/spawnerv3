# Wildcard routing for *.nuazi.ro  →  spawner container proxy (port 3002)
#
# DNS prerequisite (set once in your DNS provider):
#   *.nuazi.ro   A   <your host machine public IP>
#
# Install:
#   sudo cp nuazi.ro.conf /etc/nginx/sites-available/nuazi.ro.conf
#   sudo ln -s /etc/nginx/sites-available/nuazi.ro.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name ~^(?<subdomain>.+)\.nuazi\.ro$;

    # Pass all traffic to the spawner proxy which resolves
    # subdomain → domain route → container port
    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;

        # Forward the original Host so the proxy can extract the subdomain
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
